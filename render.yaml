services:
  - type: web
    name: healthflow
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: healthflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      # Anda bisa menambahkan variabel lingkungan lain di sini

databases:
  - name: healthflow-db
    databaseName: healthflow
    user: healthflow_user
    plan: free
