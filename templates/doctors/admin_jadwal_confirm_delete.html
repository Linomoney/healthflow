{% extends "base_admin.html" %}
{% block page_title %}Hapus Jadwal{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="hf-card p-4 text-center">
    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
    <h5 class="fw-bold mt-3">Konfirmasi Hapus</h5>
    <p class="text-muted">Yakin ingin menghapus jadwal <strong>{{ jadwal }}</strong>?</p>
    <form method="post">{% csrf_token %}
        <div class="d-flex justify-content-center gap-2">
            <button type="submit" class="btn btn-hf-danger"><i class="bi bi-trash me-1"></i> Ya, Hapus</button>
            <a href="{% url 'admin_jadwal_list' dokter.pk %}" class="btn btn-hf-outline">Batal</a>
        </div>
    </form>
</div></div></div>
{% endblock %}
