{% extends "base_admin.html" %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8"><div class="hf-card p-4">
    <form method="post" enctype="multipart/form-data" class="hf-form">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger" style="font-size:0.8rem;">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-hf-primary"><i class="bi bi-check-lg me-1"></i> Simpan</button>
            <a href="{% url 'admin_dokter_list' %}" class="btn btn-hf-outline">Batal</a>
        </div>
    </form>
</div></div></div>
{% endblock %}
